<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CityRP Legal Reference</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="rail" aria-label="Primary">
        <div class="brand">
          <img src="/data/seal.png" alt="ABA logo" class="logo" style="height:48px;width:auto;border-radius:100%;object">
          <div>
            <strong>Azalean Bar Association</strong>
            <span>Legal Database</span>
          </div>
        </div>
        <nav class="nav">
          <button class="nav-item is-active" data-view="all" title="All records">⌕ <span>Search</span></button>
          <button class="nav-item" data-view="laws" title="Acts and laws">§ <span>Laws</span></button>
          <button class="nav-item" data-view="cases" title="Case law">⚖ <span>Cases</span></button>
          <button class="nav-item" data-view="offenses" title="Offense lookup">$ <span>Offenses</span></button>
          <button class="nav-item" data-view="library" title="Court references">◫ <span>Library</span></button>
          <button class="nav-item" data-view="templates" title="Forms and templates">□ <span>Templates</span></button>
          <button class="nav-item" data-view="training" title="Lawyer training">? <span>Training</span></button>
        </nav>
        <div class="rail-footer">
          <span id="builtAt">Loading index</span>
        </div>
      </aside>

      <main class="workspace">
        <section class="toolbar" aria-label="Search controls">
          <div class="searchbox">
            <span>⌕</span>
            <input id="searchInput" type="search" autocomplete="off" placeholder="Search laws, cases, penalties, procedures, parties, citations">
          </div>
          <select id="typeFilter" aria-label="Type filter">
            <option value="">All types</option>
            <option value="law">Laws</option>
            <option value="case">Cases</option>
            <option value="library">Library</option>
          </select>
          <select id="caseStatusFilter" aria-label="Case status filter">
            <option value="">All case statuses</option>
            <option value="Pending">Pending</option>
            <option value="Dismissed">Dismissed</option>
            <option value="Adjourned">Adjourned</option>
          </select>
          <select id="tagFilter" aria-label="Topic filter">
            <option value="">All topics</option>
          </select>
        </section>

        <section class="stats-strip" id="statsStrip" aria-label="Archive stats"></section>

        <section class="content-grid">
          <section class="results-panel" aria-label="Results">
            <div class="panel-head">
              <h1 id="viewTitle">Search</h1>
              <span id="resultCount"></span>
            </div>
            <div class="quick-tools" id="quickTools"></div>
            <div class="results-list" id="resultsList"></div>
          </section>

          <section class="detail-panel" aria-label="Record details">
            <div id="detail"></div>
          </section>
        </section>
      </main>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
